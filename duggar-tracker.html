<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digging Up the Duggars — Episode Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: block;
      padding: 3rem 2rem 5rem;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      gap: 0;
    }

    .site-label {
      display: block;
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .site-label a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .site-label a:hover {
      color: var(--green);
    }

    header {
      margin-bottom: 2.5rem;
    }

    .eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      line-height: 1.2;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--green-light);
      margin: 2rem 0;
    }

    .ep-info {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .ep-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      line-height: 1.4;
    }

    .ep-desc {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ep-loading {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
    }

    .progress-section {
      margin-bottom: 2.5rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.75rem;
    }

    .progress-current {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
    }

    .progress-fraction {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .progress-bar {
      height: 2px;
      background: var(--green-light);
      position: relative;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--green);
      transition: width 0.5s ease;
    }

    .window-section {
      margin-bottom: 2.5rem;
    }

    .window-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .ep-window {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .ep-pill {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      border: 1px solid var(--green-light);
      background: none;
      color: var(--muted);
      padding: 0.4rem 0.65rem;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .ep-pill:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .ep-pill.done {
      background: var(--green);
      border-color: var(--green);
      color: var(--cream);
    }

    .ep-pill.current {
      border-color: var(--green);
      color: var(--green);
      transform: scale(1.15);
    }

    .ep-pill.current.done {
      background: var(--green);
      color: var(--cream);
      transform: scale(1.15);
    }

    .ep-dots {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      opacity: 0.4;
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .mark-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--cream);
      border: none;
      padding: 0.65rem 1.25rem;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .mark-btn:hover {
      opacity: 0.85;
    }

    .reset-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s ease;
      padding: 0;
    }

    .reset-btn:hover {
      color: #8a4a4a;
    }

    .spotify-section {
      margin-top: 1rem;
    }

    .spotify-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .save-notice {
      font-family: 'Courier Prime', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
      margin-top: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container fade-in">

    <span class="site-label"><a href="index.html">← tiny green fruit</a></span>

    <header>
      <p class="eyebrow">Podcast Episode Tracker</p>
      <h1>Digging Up the Duggars</h1>
    </header>

    <div class="divider"></div>

    <div class="progress-section">
      <div class="progress-meta">
        <span class="progress-current" id="currentEpLabel">Episode 85</span>
        <span class="progress-fraction" id="fractionLabel">85 / 176</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="ep-info" id="epInfo">
        <span class="ep-loading">loading episode info...</span>
      </div>
    </div>

    <div class="window-section">
      <p class="window-label">where you are</p>
      <div class="ep-window" id="epWindow"></div>
    </div>

    <div class="actions">
      <button class="mark-btn" id="markBtn">Mark episode done</button>
      <button class="reset-btn" id="resetBtn">reset all</button>
    </div>

    <div class="divider"></div>

    <div class="spotify-section">
      <p class="spotify-label">listen now</p>
      <iframe
        src="https://open.spotify.com/embed/show/30FmvDjIMrZioIoj2PyV0z?utm_source=generator&theme=0"
        width="100%"
        height="152"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
      </iframe>
    </div>

    <p class="save-notice">Progress saves in this browser only.</p>

  </div>

  <script>
    const TOTAL = 176;
    const WINDOW = 5;
    const STORAGE_KEY = 'duggar-tracker-v2';

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return new Set(JSON.parse(saved));
      } catch(e) {}
      const defaults = new Set();
      for (let i = 1; i <= 84; i++) defaults.add(i);
      return defaults;
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify([...listened]));
      } catch(e) {}
    }

    const listened = loadState();

    function getCurrentEp() {
      for (let i = 1; i <= TOTAL; i++) {
        if (!listened.has(i)) return i;
      }
      return TOTAL;
    }

    function updateProgress() {
      const done = listened.size;
      const current = getCurrentEp();
      const pct = Math.round(done / TOTAL * 100);
      document.getElementById('currentEpLabel').textContent = `Episode ${current}`;
      document.getElementById('fractionLabel').textContent = `${done} / ${TOTAL}`;
      document.getElementById('progressFill').style.width = pct + '%';
    }

    function renderWindow() {
      const current = getCurrentEp();
      const windowEl = document.getElementById('epWindow');
      windowEl.innerHTML = '';

      const start = Math.max(1, current - WINDOW);
      const end = Math.min(TOTAL, current + WINDOW);

      if (start > 1) {
        const dots = document.createElement('span');
        dots.className = 'ep-dots';
        dots.textContent = '···';
        windowEl.appendChild(dots);
      }

      for (let i = start; i <= end; i++) {
        const btn = document.createElement('button');
        btn.className = 'ep-pill';
        btn.textContent = i;
        if (listened.has(i)) btn.classList.add('done');
        if (i === current) btn.classList.add('current');

        btn.addEventListener('click', () => {
          if (listened.has(i)) {
            listened.delete(i);
          } else {
            listened.add(i);
          }
          saveState();
          updateProgress();
          renderWindow();
          updateEpInfo();
        });

        windowEl.appendChild(btn);
      }

      if (end < TOTAL) {
        const dots = document.createElement('span');
        dots.className = 'ep-dots';
        dots.textContent = '···';
        windowEl.appendChild(dots);
      }
    }

    document.getElementById('markBtn').addEventListener('click', () => {
      const current = getCurrentEp();
      listened.add(current);
      saveState();
      updateProgress();
      renderWindow();
      updateEpInfo();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!confirm('Reset all progress?')) return;
      listened.clear();
      saveState();
      updateProgress();
      renderWindow();
      updateEpInfo();
    });

    // RSS feed
    const RSS_URL = 'https://anchor.fm/s/8dd2f3b0/podcast/rss';
    const PROXY = `https://api.allorigins.win/get?url=${encodeURIComponent(RSS_URL)}`;
    let episodes = [];

    async function fetchEpisodes() {
      try {
        const res = await fetch(PROXY);
        const data = await res.json();
        const parser = new DOMParser();
        const xml = parser.parseFromString(data.contents, 'text/xml');
        const items = Array.from(xml.querySelectorAll('item')).reverse();
        episodes = items.map(item => ({
          title: item.querySelector('title')?.textContent || '',
          desc: item.querySelector('description')?.textContent?.replace(/<[^>]+>/g, '').trim() || ''
        }));
        updateEpInfo();
      } catch(e) {
        document.getElementById('epInfo').innerHTML = '';
      }
    }

    function updateEpInfo() {
      const current = getCurrentEp();
      const ep = episodes[current - 1];
      const infoEl = document.getElementById('epInfo');
      if (!ep) { infoEl.innerHTML = ''; return; }
      infoEl.innerHTML = `
        <span class="ep-title">${ep.title}</span>
        <span class="ep-desc">${ep.desc}</span>
      `;
    }

    updateProgress();
    renderWindow();
    fetchEpisodes();
  </script>
</body>
</html>
