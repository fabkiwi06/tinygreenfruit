<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digging Up the Duggars — Episode Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: block;
      padding: 3rem 2rem 5rem;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      gap: 0;
    }

    .site-label {
      display: block;
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .site-label a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .site-label a:hover {
      color: var(--green);
    }

    header {
      margin-bottom: 1rem;
    }

    .eyebrow {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      line-height: 1.2;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--green-light);
      margin: 1.25rem 0;
    }

    .progress-section {
      margin-bottom: 1.25rem;
    }

    .progress-meta {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .progress-current {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
    }

    .progress-fraction {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .progress-bar {
      height: 2px;
      background: var(--green-light);
      position: relative;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--green);
      transition: width 0.5s ease;
    }

    .ep-info {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .ep-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      line-height: 1.4;
    }

    .ep-desc {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ep-loading {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.5;
    }

    .spotify-section {
      margin-top: 1rem;
    }

    .spotify-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container fade-in">

    <span class="site-label"><a href="index.html">← tiny green fruit</a></span>

    <header>
      <p class="eyebrow">Podcast Episode Tracker</p>
      <h1>Digging Up the Duggars</h1>
    </header>

    <div class="divider"></div>

    <div class="progress-section">
      <div class="progress-meta">
        <span class="progress-current">Episode 87</span>
        <span class="progress-fraction">87 / 176</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 49%"></div>
      </div>
      <div class="ep-info" id="epInfo">
        <span class="ep-loading">loading episode info...</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="spotify-section">
      <p class="spotify-label">listen now</p>
      <div id="spotifyEmbed">
        <iframe
          src="https://open.spotify.com/embed/show/30FmvDjIMrZioIoj2PyV0z?utm_source=generator&theme=0"
          width="100%"
          height="152"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>
    </div>

  </div>

  <script>
    const CURRENT_EP = 87;
    const TOTAL = 176;
    const SERVER = 'https://api.tinygreenfruit.com';

    async function fetchEpisodeInfo() {
      try {
        // Fetch RSS for title and description
        const res = await fetch(`${SERVER}/rss`);
        const text = await res.text();
        const parser = new DOMParser();
        const xml = parser.parseFromString(text, 'text/xml');
        const items = Array.from(xml.querySelectorAll('item')).reverse();

        const ep = items[CURRENT_EP - 1];
        if (ep) {
          const title = ep.querySelector('title')?.textContent?.trim() || '';
          const rawDesc = (ep.querySelector('description')?.textContent || '')
            .replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&nbsp;/g, ' ').trim();
          document.getElementById('epInfo').innerHTML = `
            <span class="ep-title">${title}</span>
            <span class="ep-desc">${rawDesc}</span>
          `;
        }
      } catch(e) {
        document.getElementById('epInfo').innerHTML = '';
      }

      try {
        // Fetch specific Spotify episode
        const spotifyRes = await fetch(`${SERVER}/spotify/episode?episode=${CURRENT_EP}`);
        const spotifyData = await spotifyRes.json();
        if (spotifyData.id) {
          document.getElementById('spotifyEmbed').innerHTML = `
            <iframe
              src="https://open.spotify.com/embed/episode/${spotifyData.id}?utm_source=generator&theme=0"
              width="100%"
              height="152"
              frameborder="0"
              allowfullscreen=""
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy">
            </iframe>
          `;
        }
      } catch(e) {
        // fall back to show embed
      }
    }

    fetchEpisodeInfo();
  </script>
</body>
</html>
