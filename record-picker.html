<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>what should we listen to — tinygreenfruit</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #3d5a3e;
      --green-light: #7a9e7e;
      --cream: #f5f2eb;
      --ink: #1a1a18;
      --muted: #8a8a7a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2rem;
      opacity: 0;
      transform: translateY(12px);
      animation: appear 1s ease forwards;
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }

    .site-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .site-label a {
      color: var(--muted);
      text-decoration: none;
    }

    .site-label a:hover { color: var(--green); }

    h1 {
      font-size: 2.8rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      color: var(--ink);
    }

    .subtitle {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--green-light);
    }

    /* idle */
    .pick-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--cream);
      border: none;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .pick-btn:hover { opacity: 0.85; }
    .pick-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* record card */
    .record-card {
      display: none;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }

    .record-card.visible {
      display: flex;
      animation: appear 0.6s ease both;
    }

    .cover-wrap {
      position: relative;
      width: 300px;
      height: 300px;
      background: #d8d4c8;
      overflow: hidden;
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s ease;
    }

    .cover-wrap img.loading { opacity: 0; }

    .cover-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover-placeholder svg {
      width: 60px;
      height: 60px;
      opacity: 0.25;
    }

    .record-meta {
      margin-top: 1.6rem;
      padding-bottom: 1.6rem;
      border-bottom: 1px solid rgba(26,26,24,0.12);
    }

    .record-artist {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .record-title {
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.15;
      color: var(--ink);
    }

    .record-year {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    /* action buttons */
    .actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-top: 1.8rem;
      flex-wrap: wrap;
    }

    .btn-listened {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cream);
      background: var(--green);
      border: none;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .btn-listened:hover { opacity: 0.85; }

    .btn-skip {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s ease;
    }

    .btn-skip:hover { color: var(--ink); }

    /* cycle complete */
    .cycle-banner {
      display: none;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
    }

    .cycle-banner.visible {
      display: flex;
      animation: appear 0.6s ease both;
    }

    .cycle-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: var(--green);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .cycle-banner p {
      font-size: 1.25rem;
      font-style: italic;
      font-weight: 300;
      color: var(--ink);
      line-height: 1.5;
    }

    /* progress */
    .progress-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }

    .progress-track {
      width: 100%;
      height: 1px;
      background: rgba(138,138,122,0.25);
    }

    .progress-fill {
      height: 100%;
      background: var(--green-light);
      transition: width 0.6s ease;
    }

    /* toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--cream);
      background: var(--ink);
      padding: 0.65rem 1.2rem;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="site-label"><a href="index.html">← tinygreenfruit</a></div>

    <div>
      <h1>what should we<br>listen to tonight?</h1>
      <p class="subtitle">because left to your own devices, you'd just put on in motion again.</p>
    </div>

    <div class="divider"></div>

    <!-- idle state -->
    <div id="idleState">
      <button class="pick-btn" id="pickBtn" onclick="pickRecord()">pick a record</button>
    </div>

    <!-- record card -->
    <div class="record-card" id="recordCard">
      <div class="cover-wrap">
        <div class="cover-placeholder" id="coverPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="9"/>
            <line x1="12" y1="15" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="9" y2="12"/>
            <line x1="15" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        <img id="coverImg" class="loading" src="" alt="" />
      </div>

      <div class="record-meta">
        <div class="record-artist" id="recordArtist"></div>
        <div class="record-title" id="recordTitle"></div>
        <div class="record-year" id="recordYear"></div>
      </div>

      <div class="actions">
        <button class="btn-listened" onclick="logListened()">✓ listened to this</button>
        <button class="btn-skip" onclick="skipRecord()">skip for tonight</button>
      </div>
    </div>

    <!-- cycle complete -->
    <div class="cycle-banner" id="cycleBanner">
      <div class="cycle-label">cycle complete</div>
      <p>You've listened to everything at least once. Time to start fresh.</p>
      <button class="pick-btn" onclick="resetCycle()">start a new cycle</button>
    </div>

    <!-- progress -->
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-label">
        <span>this cycle</span>
        <span id="progressCount">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = 'https://api.tinygreenfruit.com';

    let currentRecord = null;
    let skippedThisSession = new Set();
    let totalRecords = 0;
    let listenedCount = 0;

    async function pickRecord() {
      const btn = document.getElementById('pickBtn');
      btn.disabled = true;
      btn.textContent = 'finding a record…';

      try {
        const params = new URLSearchParams();
        skippedThisSession.forEach(id => params.append('skip', id));

        const res = await fetch(`${API}/records/pick?${params}`);
        const data = await res.json();

        if (data.cycle_complete) {
          showCycleBanner();
          return;
        }

        currentRecord = data.record;
        totalRecords = data.total;
        listenedCount = data.listened_count;

        showRecord(currentRecord);
        updateProgress();
      } catch (e) {
        showToast('something went wrong. try again.');
        btn.disabled = false;
        btn.textContent = 'pick a record';
      }
    }

    function showRecord(record) {
      document.getElementById('recordArtist').textContent = record.artist;
      document.getElementById('recordTitle').textContent = record.album;
      document.getElementById('recordYear').textContent = record.year || '';

      const img = document.getElementById('coverImg');
      img.classList.add('loading');
      img.src = '';

      if (record.cover_url) {
        img.onload = () => img.classList.remove('loading');
        img.onerror = () => { img.src = ''; };
        img.src = record.cover_url;
        img.alt = `${record.album} by ${record.artist}`;
      }

      document.getElementById('idleState').style.display = 'none';
      document.getElementById('cycleBanner').classList.remove('visible');
      document.getElementById('recordCard').classList.add('visible');
      document.getElementById('progressWrap').style.display = 'flex';
    }

    async function logListened() {
      if (!currentRecord) return;

      try {
        await fetch(`${API}/records/listened`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: currentRecord.id })
        });

        listenedCount++;
        updateProgress();
        showToast('logged. nice one.');
        currentRecord = null;

        document.getElementById('recordCard').classList.remove('visible');
        document.getElementById('idleState').style.display = 'block';
        const btn = document.getElementById('pickBtn');
        btn.disabled = false;
        btn.textContent = 'pick another';

      } catch (e) {
        showToast("couldn't log that. try again.");
      }
    }

    function skipRecord() {
      if (!currentRecord) return;
      skippedThisSession.add(currentRecord.id);
      currentRecord = null;

      document.getElementById('recordCard').classList.remove('visible');
      document.getElementById('idleState').style.display = 'block';
      const btn = document.getElementById('pickBtn');
      btn.disabled = false;
      btn.textContent = 'pick another';
    }

    function showCycleBanner() {
      document.getElementById('idleState').style.display = 'none';
      document.getElementById('recordCard').classList.remove('visible');
      document.getElementById('cycleBanner').classList.add('visible');
    }

    async function resetCycle() {
      try {
        await fetch(`${API}/records/reset`, { method: 'POST' });
        skippedThisSession.clear();
        listenedCount = 0;
        document.getElementById('cycleBanner').classList.remove('visible');
        document.getElementById('idleState').style.display = 'block';
        const btn = document.getElementById('pickBtn');
        btn.disabled = false;
        btn.textContent = 'pick a record';
        updateProgress();
      } catch (e) {
        showToast('reset failed. try again.');
      }
    }

    function updateProgress() {
      if (totalRecords === 0) return;
      const pct = Math.round((listenedCount / totalRecords) * 100);
      document.getElementById('progressCount').textContent = `${listenedCount} / ${totalRecords}`;
      document.getElementById('progressFill').style.width = `${pct}%`;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>

</body>
</html>
