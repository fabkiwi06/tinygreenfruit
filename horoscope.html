<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Stars Align (All Too Well)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #3d5a3e;
      --green-light: #7a9e7e;
      --cream: #f5f2eb;
      --ink: #1a1a18;
      --muted: #8a8a7a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 520px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2rem;
      opacity: 0;
      transform: translateY(12px);
      animation: appear 1s ease forwards;
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0); }
    }

    .site-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .site-label a {
      color: var(--muted);
      text-decoration: none;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      color: var(--ink);
    }

    .subtitle {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--green-light);
    }

    .sign-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      width: 100%;
    }

    .sign-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--green-light);
      color: var(--muted);
      padding: 0.5rem 0.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .sign-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }

    .sign-btn.active {
      border-color: var(--green);
      background: var(--green);
      color: var(--cream);
    }

    .sign-symbol {
      font-size: 1rem;
    }

    .generate-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--cream);
      border: none;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s ease;
      display: none;
    }

    .generate-btn:hover {
      opacity: 0.85;
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result {
      display: none;
      flex-direction: column;
      gap: 1.25rem;
      width: 100%;
      opacity: 0;
      animation: appear 0.8s ease forwards;
    }

    .result.visible {
      display: flex;
    }

    .result-sign {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
    }

    .horoscope-text {
      font-size: 1.25rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink);
    }

    .song-rec {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .vinyl-emoji {
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .lyric-quote {
      font-size: 1.1rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.5;
      color: var(--ink);
    }

    .lyric-source {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.25rem;
      padding-left: 1.25rem;
    }

    .again-btn {
      font-family: 'Courier Prime', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.2s ease;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .again-btn:hover {
      color: var(--green);
    }

    .loading {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: none;
    }

    .error {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: #8a4a4a;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="site-label"><a href="index.html">← tiny green fruit</a></div>

    <div>
      <h1>The Stars Align (All Too Well)</h1>
      <p class="subtitle">A Taylor Swift horoscope generator</p>
    </div>

    <div class="divider"></div>

    <div class="sign-grid">
      <button class="sign-btn" data-sign="Aries" data-dates="Mar 21 – Apr 19">
        <span class="sign-symbol">♈</span>Aries
      </button>
      <button class="sign-btn" data-sign="Taurus" data-dates="Apr 20 – May 20">
        <span class="sign-symbol">♉</span>Taurus
      </button>
      <button class="sign-btn" data-sign="Gemini" data-dates="May 21 – Jun 20">
        <span class="sign-symbol">♊</span>Gemini
      </button>
      <button class="sign-btn" data-sign="Cancer" data-dates="Jun 21 – Jul 22">
        <span class="sign-symbol">♋</span>Cancer
      </button>
      <button class="sign-btn" data-sign="Leo" data-dates="Jul 23 – Aug 22">
        <span class="sign-symbol">♌</span>Leo
      </button>
      <button class="sign-btn" data-sign="Virgo" data-dates="Aug 23 – Sep 22">
        <span class="sign-symbol">♍</span>Virgo
      </button>
      <button class="sign-btn" data-sign="Libra" data-dates="Sep 23 – Oct 22">
        <span class="sign-symbol">♎</span>Libra
      </button>
      <button class="sign-btn" data-sign="Scorpio" data-dates="Oct 23 – Nov 21">
        <span class="sign-symbol">♏</span>Scorpio
      </button>
      <button class="sign-btn" data-sign="Sagittarius" data-dates="Nov 22 – Dec 21">
        <span class="sign-symbol">♐</span>Sagittarius
      </button>
      <button class="sign-btn" data-sign="Capricorn" data-dates="Dec 22 – Jan 19">
        <span class="sign-symbol">♑</span>Capricorn
      </button>
      <button class="sign-btn" data-sign="Aquarius" data-dates="Jan 20 – Feb 18">
        <span class="sign-symbol">♒</span>Aquarius
      </button>
      <button class="sign-btn" data-sign="Pisces" data-dates="Feb 19 – Mar 20">
        <span class="sign-symbol">♓</span>Pisces
      </button>
    </div>

    <button class="generate-btn" id="generateBtn">Read my stars</button>

    <div class="loading" id="loading">and we were dancin' like we're made of starlight...</div>
    <div class="error" id="error">something went wrong. shake it off and try again.</div>

    <div class="result" id="result">
      <div class="result-sign" id="resultSign"></div>
      <p class="horoscope-text" id="horoscopeText"></p>
      <div class="song-rec">
        <span class="vinyl-emoji">💿</span>
        <div>
          <p class="lyric-quote" id="songTitle"></p>
          <p class="lyric-source" id="songAlbum"></p>
        </div>
      </div>
      <button class="again-btn" id="againBtn">read again</button>
    </div>

  </div>

  <script>
    const signs = {
      Aries: {
        traits: "bold, impulsive, competitive, passionate, quick to anger, a starter not a finisher, always charging ahead",
        lyricVibe: "fierce, defiant, charged with adrenaline — songs about fighting back, not waiting around, burning bright"
      },
      Taurus: {
        traits: "stubborn, sensual, loyal to a fault, slow to change, deeply attached to comfort and the past",
        lyricVibe: "nostalgic, grounded, holding on too long — songs about staying, remembering, loving what you can't let go"
      },
      Gemini: {
        traits: "dual-natured, witty, restless, charming, contradictory, always reinventing themselves",
        lyricVibe: "playful and sharp, two sides at once — songs that shift tone mid-story, clever wordplay, light and dark together"
      },
      Cancer: {
        traits: "deeply emotional, nurturing, prone to nostalgia, protective, cries at everything, holds on forever",
        lyricVibe: "tender, aching, saturated with feeling — songs about grief, memory, love that lingers long after it's gone"
      },
      Leo: {
        traits: "dramatic, generous, spotlight-seeking, proud, warm-hearted, refuses to be ignored",
        lyricVibe: "anthemic, bold, unapologetic — songs about owning the room, shaking off the critics, being the main character"
      },
      Virgo: {
        traits: "analytical, perfectionist, quietly anxious, service-oriented, notices every detail, hard on themselves",
        lyricVibe: "precise and introspective — songs that catalog every moment, over-analyze love, find meaning in the small things"
      },
      Libra: {
        traits: "charming, indecisive, romantic, people-pleasing, obsessed with fairness and balance",
        lyricVibe: "romantic and wistful — songs about almost-love, weighing both sides, longing for harmony"
      },
      Scorpio: {
        traits: "intense, obsessive, magnetic, secretive, never forgets a wrong, transforms through destruction",
        lyricVibe: "dark, vengeful, and deeply felt — songs about betrayal, power, wanting someone you can't stop thinking about"
      },
      Sagittarius: {
        traits: "free-spirited, blunt, adventurous, commitment-averse, always chasing the next thing",
        lyricVibe: "wandering and wide-open — songs about escape, the open road, loving the idea of something more than the reality"
      },
      Capricorn: {
        traits: "ambitious, disciplined, guarded, strategic, takes the long view, earns everything the hard way",
        lyricVibe: "determined and quietly proud — songs about working for it, proving people wrong, building something that lasts"
      },
      Aquarius: {
        traits: "eccentric, independent, idealistic, emotionally detached, marches to their own drummer",
        lyricVibe: "strange and self-possessed — songs that don't care what you think, outsider anthems, loving from a distance"
      },
      Pisces: {
        traits: "dreamy, empathetic, prone to fantasy, absorbs others' emotions, lives between worlds",
        lyricVibe: "hazy, romantic, slightly unreal — songs that blur memory and dream, love that feels like a spell, soft and aching"
      }
    };

    let selectedSign = null;

    const signBtns = document.querySelectorAll('.sign-btn');
    const generateBtn = document.getElementById('generateBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const resultSign = document.getElementById('resultSign');
    const horoscopeText = document.getElementById('horoscopeText');
    const lyricQuote = document.getElementById('songTitle');
    const lyricSource = document.getElementById('songAlbum');
    const againBtn = document.getElementById('againBtn');

    signBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        signBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSign = btn.dataset.sign;
        generateBtn.style.display = 'block';
        result.classList.remove('visible');
        error.style.display = 'none';
      });
    });

    generateBtn.addEventListener('click', generate);
    againBtn.addEventListener('click', generate);

    async function generate() {
      if (!selectedSign) return;

      const sign = signs[selectedSign];
      result.classList.remove('visible');
      error.style.display = 'none';
      loading.style.display = 'block';
      generateBtn.disabled = true;

      const prompt = `You are a serious, poetic astrologer who writes horoscopes exclusively using Taylor Swift lyrics and imagery.

The sign is ${selectedSign}.

${selectedSign} traits: ${sign.traits}

Lyric vibe to draw from: ${sign.lyricVibe}

Write a horoscope for ${selectedSign} and recommend one Taylor Swift song that fits the energy of this reading.

HOROSCOPE: 2-3 sentences, mystical, direct, present tense. Do not mention Taylor Swift by name. Weave in actual Taylor Swift lyrics and imagery so naturally that it reads like the stars themselves wrote it. Use her voice: conversational but poetic, specific and emotional, the kind of line that hits you in the chest. No em dashes. No overly formal language. Write like a real person who feels things deeply and says them plainly.

SONG: One real Taylor Swift song title that matches the vibe of this sign and this reading. Pick something that genuinely fits, not just the most obvious choice. Vary across her full catalog and all eras.

Respond in this exact format:
HOROSCOPE: [horoscope text]
SONG: [song title]
ALBUM: [album name]`;

      try {
        const response = await fetch("https://api.tinygreenfruit.com/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }]
          })
        });

        const data = await response.json();
        const text = data.content[0].text;

        const horoscopeMatch = text.match(/HOROSCOPE:\s*(.+?)(?=SONG:)/s);
        const songMatch = text.match(/SONG:\s*(.+?)(?=ALBUM:)/s);
        const albumMatch = text.match(/ALBUM:\s*(.+)/s);

        if (!horoscopeMatch || !songMatch || !albumMatch) throw new Error('parse error');

        resultSign.textContent = `${selectedSign} ✦ your reading`;
        horoscopeText.textContent = horoscopeMatch[1].trim();
        lyricQuote.textContent = songMatch[1].trim();
        lyricSource.textContent = albumMatch[1].trim();

        loading.style.display = 'none';
        result.classList.add('visible');

      } catch (err) {
        loading.style.display = 'none';
        error.style.display = 'block';
      }

      generateBtn.disabled = false;
    }
  </script>
</body>
</html>
