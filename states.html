<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>States — tinygreenfruit</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      padding: 4rem 2rem;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page {
      max-width: 860px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    header { margin-bottom: 3rem; }

    .back-link {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .year-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 0.4rem;
    }

    .count {
      font-family: 'Courier Prime', monospace;
      font-size: 0.8rem;
      color: var(--green);
      letter-spacing: 0.08em;
      margin-top: 1.6rem;
    }

    #map-container {
      width: 100%;
      margin-top: 2.5rem;
    }

    #map-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .state {
      fill: #e0dcd2;
      stroke: var(--cream);
      stroke-width: 0.8;
      transition: fill 0.15s ease;
      cursor: default;
    }

    .state.visited {
      fill: var(--green);
      cursor: pointer;
    }

    .state.visited:hover {
      fill: var(--green-light);
    }

    .inset-label {
      font-family: 'Courier Prime', monospace;
      font-size: 9px;
      fill: var(--muted);
      letter-spacing: 0.05em;
    }

    .inset-box {
      fill: none;
      stroke: #ccc8be;
      stroke-width: 0.5;
    }

    .tooltip {
      position: fixed;
      background: var(--ink);
      color: var(--cream);
      padding: 0.9rem 1.1rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 100;
      max-width: 230px;
    }
    .tooltip.visible { opacity: 1; }

    .tooltip-state {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--green-light);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .tooltip-city {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.2;
    }
    .tooltip-note {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: #b0ac9e;
      margin-top: 0.2rem;
      line-height: 1.3;
    }
    .tooltip-date {
      font-family: 'Courier Prime', monospace;
      font-size: 0.65rem;
      color: #6a6a5a;
      margin-top: 0.5rem;
      letter-spacing: 0.06em;
    }

    footer {
      margin-top: 2.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="page">

    <header>
      <a class="back-link" href="index.html">← tinygreenfruit</a>
      <h1>states visited</h1>
      <p class="year-label">2026</p>
      <p class="count" id="count-label"></p>
    </header>

    <div id="map-container"></div>

    <footer>hover over a state to learn more</footer>

  </div>

  <div class="tooltip" id="tooltip">
    <div class="tooltip-state" id="tt-state"></div>
    <div class="tooltip-city" id="tt-city"></div>
    <div class="tooltip-note" id="tt-note"></div>
    <div class="tooltip-date" id="tt-date"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <script>
    const visited = {
      TN: { city: "Nashville",     note: "Homebase",                   date: null       },
      LA: { city: "New Orleans",   note: "FAI 2026",                   date: "January"  },
      NV: { city: "Las Vegas",     note: "INTIX 2026",                 date: "January"  },
      MN: { city: "Minneapolis",   note: "Kiwi's Excellent Road Trip", date: "February" },
      IA: { city: null,            note: "Kiwi's Excellent Road Trip", date: "March"    },
      MO: { city: null,            note: "Kiwi's Excellent Road Trip", date: "March"    },
      KY: { city: null,            note: "Kiwi's Excellent Road Trip", date: "March"    },
    };

    const fipsToAbbr = {
      "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT",
      "10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL",
      "18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD",
      "25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE",
      "32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND",
      "39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD",
      "47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV",
      "55":"WI","56":"WY"
    };

    const abbrToName = {
      AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",
      CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",
      ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",
      LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",
      MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",
      NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",
      NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",
      PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",
      TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",
      WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming",
      HI:"Hawaii",DC:"D.C."
    };

    const count = Object.keys(visited).length;
    document.getElementById('count-label').textContent =
      `${count} state${count !== 1 ? 's' : ''} visited`;

    const tooltip = document.getElementById('tooltip');
    const ttState = document.getElementById('tt-state');
    const ttCity  = document.getElementById('tt-city');
    const ttNote  = document.getElementById('tt-note');
    const ttDate  = document.getElementById('tt-date');

    function showTooltip(e, abbr) {
      const data = visited[abbr];
      ttState.textContent = abbrToName[abbr] || abbr;
      ttCity.textContent  = data.city  || '';
      ttNote.textContent  = data.note  || '';
      ttDate.textContent  = data.date  || '';
      tooltip.classList.add('visible');
      moveTooltip(e);
    }

    function moveTooltip(e) {
      let x = e.clientX + 16;
      let y = e.clientY + 16;
      if (x + 250 > window.innerWidth)  x = e.clientX - 250;
      if (y + 140 > window.innerHeight) y = e.clientY - 140;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }

    function hideTooltip() { tooltip.classList.remove('visible'); }

    // ── Map setup ─────────────────────────────────────────────────────────────
    const width  = 900;
    const height = 560;

    const svg = d3.select('#map-container')
      .append('svg')
      .attr('viewBox', `0 0 ${width} ${height}`);

    // Inset border boxes
    svg.append('rect').attr('class','inset-box').attr('x',20).attr('y',385).attr('width',130).attr('height',90);
    svg.append('rect').attr('class','inset-box').attr('x',165).attr('y',425).attr('width',110).attr('height',55);

    // Inset labels
    svg.append('text').attr('class','inset-label').attr('x',25).attr('y',396).text('AK');
    svg.append('text').attr('class','inset-label').attr('x',170).attr('y',436).text('HI');

    // Groups
    const gMain = svg.append('g');
    const gAK   = svg.append('g').attr('transform','translate(22,398) scale(0.31)');
    const gHI   = svg.append('g').attr('transform','translate(167,438) scale(0.6)');

    // Projections
    const projMain = d3.geoAlbersUsa().scale(1100).translate([width/2 + 30, height/2 - 20]);

    const projAK = d3.geoMercator()
      .center([-153, 64])
      .scale(360)
      .translate([0, 0]);

    const projHI = d3.geoMercator()
      .center([-157, 20.5])
      .scale(1400)
      .translate([0, 0]);

    const pathMain = d3.geoPath().projection(projMain);
    const pathAK   = d3.geoPath().projection(projAK);
    const pathHI   = d3.geoPath().projection(projHI);

    function bindEvents(selection) {
      selection
        .on('mouseenter', function(e, d) {
          const abbr = fipsToAbbr[(d.id || '').toString().padStart(2,'0')];
          if (abbr && visited[abbr]) showTooltip(e, abbr);
        })
        .on('mousemove', function(e) { moveTooltip(e); })
        .on('mouseleave', hideTooltip);
    }

    function stateClass(d) {
      const abbr = fipsToAbbr[(d.id || '').toString().padStart(2,'0')];
      return 'state' + (abbr && visited[abbr] ? ' visited' : '');
    }

    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
      .then(r => r.json())
      .then(us => {
        const states = topojson.feature(us, us.objects.states);

        // Continental
        gMain.selectAll('.state')
          .data(states.features.filter(d => {
            const abbr = fipsToAbbr[(d.id||'').toString().padStart(2,'0')];
            return abbr !== 'AK' && abbr !== 'HI';
          }))
          .join('path')
          .attr('class', stateClass)
          .attr('d', pathMain)
          .call(bindEvents);

        // Alaska
        const ak = states.features.find(d => fipsToAbbr[(d.id||'').toString().padStart(2,'0')] === 'AK');
        if (ak) {
          gAK.append('path')
            .datum(ak)
            .attr('class', stateClass(ak))
            .attr('d', pathAK)
            .call(bindEvents);
        }

        // Hawaii
        const hi = states.features.find(d => fipsToAbbr[(d.id||'').toString().padStart(2,'0')] === 'HI');
        if (hi) {
          gHI.append('path')
            .datum(hi)
            .attr('class', stateClass(hi))
            .attr('d', pathHI)
            .call(bindEvents);
        }
      })
      .catch(() => {
        document.getElementById('map-container').innerHTML =
          '<p style="font-family:\'Courier Prime\',monospace;font-size:0.8rem;color:#8a8a7a;margin-top:1rem;">map failed to load.</p>';
      });
  </script>
</body>
</html>
