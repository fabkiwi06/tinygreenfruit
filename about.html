<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>about — tiny green fruit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Courier+Prime&display=swap" rel="stylesheet" />
<style>
:root {
  --green: #3d5a3e;
  --green-light: #7a9e7e;
  --cream: #f5f2eb;
  --ink: #1a1a18;
  --muted: #8a8a7a;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--cream);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 4rem 2rem;
}

.container {
  max-width: 480px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2.5rem;
  opacity: 0;
  transform: translateY(12px);
  animation: appear 1.2s ease forwards;
  animation-delay: 0.2s;
}

@keyframes appear {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.site-label {
  font-family: 'Courier Prime', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.site-label a {
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s ease;
}

.site-label a:hover {
  color: var(--green);
}

h1 {
  font-family: 'Courier Prime', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--green);
  font-weight: 400;
}

.divider {
  width: 40px;
  height: 1px;
  background: var(--green-light);
}

.portrait {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}

.items {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  padding-left: 0.1rem;
}

.items li {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.2rem;
  font-weight: 300;
  color: var(--ink);
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
}

.items li::before {
  content: '';
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background-color: var(--green-light);
  flex-shrink: 0;
  margin-bottom: 0.1em;
}
</style>
</head>
<body>
<div class="container">

  <div class="site-label"><a href="index.html">← tiny green fruit</a></div>

  <h1>about</h1>

  <div class="divider"></div>

  <img class="portrait" src="image/tinygreenfruit-about.png" alt="kiwi" />

  <ul class="items">
    <li>goes by kiwi</li>
    <li>nashville local</li>
    <li>has strong opinions about dumplings and softer ones about everything else</li>
    <li>built this instead of doing something more productive</li>
  </ul>

</div>
</body>
</html>
